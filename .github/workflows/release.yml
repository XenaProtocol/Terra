name: Terra Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Download Dalamud
      run: |
        Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
        Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

    - name: Build
      run: dotnet build --configuration Release

    - name: Create Release Package
      run: |
        # 1. Create a clean staging folder
        New-Item -ItemType Directory -Force -Path ".\publish"
        
        # 2. Copy the files into the staging folder
        # Using a wildcard to grab the files from the output directory
        Copy-Item -Path ".\Terra\bin\x64\Release\Terra\Terra.dll" -Destination ".\publish\"
        Copy-Item -Path ".\Terra\bin\x64\Release\Terra\Terra.json" -Destination ".\publish\"
        
        # 3. Zip ONLY the contents of the publish folder
        Compress-Archive -Path ".\publish\*" -DestinationPath "latest.zip" -Force
        
    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        files: latest.zip
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}